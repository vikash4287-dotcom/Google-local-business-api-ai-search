<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f8fafc"/>
  
  <!-- Subtle decorative background rays/grid -->
  <circle cx="600" cy="315" r="400" fill="none" stroke="#f1f5f9" stroke-width="1.5" />
  <circle cx="600" cy="315" r="500" fill="none" stroke="#f1f5f9" stroke-width="1" />
  
  <!-- Main Logo Circular Frame -->
  <circle cx="600" cy="315" r="260" fill="#ffffff" stroke="#6366f1" stroke-width="10" />
  
  <!-- Purple Rounded Square Icon -->
  <rect x="530" y="140" width="140" height="140" rx="35" fill="#4f46e5" />
  
  <!-- Four-Pointed Star -->
  <path d="M600 175 C600 195 600 195 620 195 C600 195 600 195 600 215 C600 195 600 195 580 195 C600 195 600 195 600 175 Z" fill="#ffffff" />
  
  <!-- Sparkle rays/accents in top right of the square -->
  <line x1="628" y1="183" x2="638" y2="173" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" />
  <line x1="616" y1="170" x2="620" y2="160" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Small circle in the bottom-left of the purple square -->
  <circle cx="560" cy="230" r="8" fill="#ffffff" />
  
  <!-- LocalShop AI Brand Typography -->
  <text x="600" y="360" font-family="'Inter', system-ui, sans-serif" font-size="54" font-weight="900" fill="#0f172a" text-anchor="middle" letter-spacing="-1">LocalShop</text>
  <text x="600" y="430" font-family="'Inter', system-ui, sans-serif" font-size="64" font-weight="900" fill="#4f46e5" text-anchor="middle" letter-spacing="-1">AI</text>
  
  <!-- Subtitle with horizontal accent lines -->
  <line x1="440" y1="485" x2="475" y2="485" stroke="#4f46e5" stroke-width="4.5" stroke-linecap="round" />
  <text x="600" y="491" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="900" fill="#1e293b" letter-spacing="3" text-anchor="middle">NEXT-GEN LOCAL LEAD PROSPECTING</text>
  <line x1="725" y1="485" x2="760" y2="485" stroke="#4f46e5" stroke-width="4.5" stroke-linecap="round" />
</svg>
